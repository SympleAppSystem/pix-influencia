<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel de Recuperação - Pix Influência</title>
    <link rel="icon" type="image/png" href="https://i.postimg.cc/YqkptFRW/Design-sem-nome-(4).png">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <style>
        :root { --primary: #2a5298; --success: #25D366; --warning: #ffc107; --danger: #f44336; --dark: #1e293b; --light: #f8fafc; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #e2e8f0; margin: 0; padding: 0; color: #334155; }
        * { box-sizing: border-box; }

        /* HEADER DO PAINEL */
        .admin-header { background: var(--dark); color: white; padding: 20px 30px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .admin-header h1 { margin: 0; font-size: 22px; font-weight: 800; display: flex; align-items: center; gap: 10px; }
        
        .header-actions { display: flex; align-items: center; gap: 15px; }
        .live-indicator { background: rgba(37, 211, 102, 0.2); color: #4ade80; padding: 5px 12px; border-radius: 20px; font-size: 12px; font-weight: bold; border: 1px solid rgba(74, 222, 128, 0.5); display: flex; align-items: center; gap: 6px; }
        .dot { width: 8px; height: 8px; background: #4ade80; border-radius: 50%; animation: pulse 2s infinite; }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(74,222,128,0.7); } 70% { box-shadow: 0 0 0 6px rgba(74,222,128,0); } 100% { box-shadow: 0 0 0 0 rgba(74,222,128,0); } }

        .btn-alertas { background: var(--success); color: white; border: none; padding: 6px 12px; border-radius: 8px; font-size: 12px; font-weight: bold; cursor: pointer; transition: 0.2s; box-shadow: 0 2px 5px rgba(37, 211, 102, 0.3); }
        .btn-alertas:hover { background: #1da851; }

        .container { max-width: 1200px; margin: 30px auto; padding: 0 20px; }

        /* CARDS DE MÉTRICAS */
        .metrics-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .metric-card { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); display: flex; align-items: center; justify-content: space-between; border-left: 5px solid; }
        .metric-card.blue { border-color: var(--primary); }
        .metric-card.yellow { border-color: var(--warning); }
        .metric-card.red { border-color: var(--danger); }
        .metric-info h3 { margin: 0 0 5px 0; font-size: 14px; color: #64748b; text-transform: uppercase; font-weight: 700; }
        .metric-value { margin: 0; font-size: 28px; font-weight: 900; color: var(--dark); }
        .metric-icon { font-size: 40px; opacity: 0.2; }

        /* TABELA INTELIGENTE */
        .table-container { background: white; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); overflow: hidden; }
        .table-header { padding: 20px; border-bottom: 1px solid #e2e8f0; display: flex; justify-content: space-between; align-items: center; background: #fff; }
        .table-header h2 { margin: 0; font-size: 18px; color: var(--dark); }
        
        table { width: 100%; border-collapse: collapse; text-align: left; }
        th { background: #f8fafc; padding: 15px 20px; font-size: 13px; text-transform: uppercase; color: #64748b; font-weight: 700; letter-spacing: 0.5px; border-bottom: 2px solid #e2e8f0; }
        td { padding: 15px 20px; border-bottom: 1px solid #e2e8f0; font-size: 15px; color: #334155; vertical-align: middle; }
        tr:hover { background-color: #f1f5f9; }

        .tag { padding: 5px 10px; border-radius: 6px; font-size: 12px; font-weight: bold; display: inline-block; }
        .tag-abandono { background: #fee2e2; color: #b91c1c; border: 1px solid #fca5a5; }
        .tag-pendente { background: #fef3c7; color: #b45309; border: 1px solid #fde68a; }

        .numeros-badge { background: #e0e7ff; color: #3730a3; padding: 4px 8px; border-radius: 4px; font-size: 13px; font-weight: bold; letter-spacing: 1px; word-break: break-all; max-width: 250px; display: inline-block; }
        .valor-texto { font-weight: 900; color: #0f172a; }

        .btn-wpp { background: var(--success); color: white; border: none; padding: 8px 15px; border-radius: 8px; font-size: 13px; font-weight: bold; cursor: pointer; display: flex; align-items: center; gap: 6px; text-decoration: none; transition: 0.2s; box-shadow: 0 4px 6px rgba(37, 211, 102, 0.2); }
        .btn-wpp:hover { background: #1da851; transform: translateY(-2px); box-shadow: 0 6px 12px rgba(37, 211, 102, 0.3); }

        .empty-state { text-align: center; padding: 50px 20px; color: #94a3b8; }
        .empty-state text { font-size: 16px; margin-top: 10px; display: block; }
    </style>
</head>
<body>

    <div class="admin-header">
        <h1>📊 Máquina de Recuperação</h1>
        <div class="header-actions">
            <button id="btnAlertas" class="btn-alertas" onclick="ativarAlertas()">🔔 Ativar Alertas de Som</button>
            <div class="live-indicator"><span class="dot"></span> Radar Ativo</div>
        </div>
    </div>

    <div class="container">
        <!-- CARDS -->
        <div class="metrics-grid">
            <div class="metric-card blue">
                <div class="metric-info">
                    <h3>Total de Leads</h3>
                    <p class="metric-value" id="cardLeads">0</p>
                </div>
                <div class="metric-icon">👥</div>
            </div>
            <div class="metric-card red">
                <div class="metric-info">
                    <h3>Carrinhos Abandonados</h3>
                    <p class="metric-value" id="cardAbandonado">R$ 0,00</p>
                </div>
                <div class="metric-icon">🛒</div>
            </div>
            <div class="metric-card yellow">
                <div class="metric-info">
                    <h3>Reservas Pendentes (PIX)</h3>
                    <p class="metric-value" id="cardPendente">R$ 0,00</p>
                </div>
                <div class="metric-icon">⏳</div>
            </div>
        </div>

        <!-- TABELA INTELIGENTE -->
        <div class="table-container">
            <div class="table-header">
                <h2>Oportunidades Quentes 🔥</h2>
                <span style="font-size: 13px; color: #64748b;">(Atualização Automática)</span>
            </div>
            <table>
                <thead>
                    <tr>
                        <th>Status</th>
                        <th>Cliente</th>
                        <th>Cotas Selecionadas</th>
                        <th>Valor a Recuperar</th>
                        <th>Data/Hora</th>
                        <th>Ação</th>
                    </tr>
                </thead>
                <tbody id="tabelaCorpo">
                    <tr><td colspan="6" class="empty-state">A carregar dados do radar...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <script>
        // 🚨 CONFIGURAÇÃO DO SUPABASE
        const SUPABASE_URL = 'https://lukdkotczqindytggpvm.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imx1a2Rrb3RjenFpbmR5dGdncHZtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI5MzQ3NzMsImV4cCI6MjA5ODUxMDc3M30.YTx_2J0Ebr-fiXftPJqgvU90pRpkx664dKN9F2RxVjA';
        const banco = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        const MINHA_CHAVE_PIX = "75999512480"; 

        // CONFIGURAÇÕES DE ALERTA SONORO
        let alertasAtivos = false;
        let totalLeadsAnterior = -1;
        const somNotificacao = new Audio('https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3'); // Som de "Plim"

        function ativarAlertas() {
            Notification.requestPermission().then(perm => {
                if (perm === "granted") {
                    alertasAtivos = true;
                    somNotificacao.play().catch(()=>{}); // Executa 1 vez no volume 0 para desbloquear o navegador
                    let btn = document.getElementById('btnAlertas');
                    btn.innerText = "✅ Alertas Ativos";
                    btn.style.background = "#1da851";
                    btn.style.boxShadow = "none";
                } else {
                    alert("Por favor, permita as notificações no navegador para receber os avisos.");
                }
            });
        }

        function formatarMoeda(valor) { return "R$ " + parseFloat(valor).toFixed(2).replace('.', ','); }
        function formatarZap(zap) {
            if(!zap || zap.length < 12) return zap;
            let ddd = zap.substring(2, 4);
            let num = zap.substring(4);
            return `(${ddd}) ${num.substring(0, 5)}-${num.substring(5)}`;
        }

        async function buscarOportunidades() {
            try {
                const { data: abandonos } = await banco.from('carrinhos_abandonados').select('*');
                const { data: config } = await banco.from('gerenciador').select('valor_cota').or('status.ilike.ativa,status.ilike.pendente').limit(1);
                let valorCota = config && config.length > 0 ? parseFloat(config[0].valor_cota.toString().replace(',','.')) : 10.00;
                const { data: reservas } = await banco.from('sorteio').select('*').ilike('status', 'Reservado');

                let listaUnificada = [];
                let totalAbandonado = 0;
                let totalPendente = 0;

                if (abandonos) {
                    abandonos.forEach(item => {
                        let valorNum = parseFloat(item.valor.replace('R$','').replace('.','').replace(',','.'));
                        totalAbandonado += valorNum;
                        listaUnificada.push({
                            tipo: 'abandono', statusText: 'Carrinho Abandonado', nome: item.nome, whatsapp: item.whatsapp, numeros: item.numeros_selecionados, valorTotal: item.valor, data: item.data_tentativa
                        });
                    });
                }

                if (reservas) {
                    let gruposReserva = {};
                    reservas.forEach(r => {
                        let zap = r.whatsapp.replace(/\D/g, '');
                        if(!gruposReserva[zap]) { gruposReserva[zap] = { nome: r.nome, whatsapp: zap, numeros: [], valorSoma: 0, data: r.data }; }
                        gruposReserva[zap].numeros.push(r.numero);
                        gruposReserva[zap].valorSoma += valorCota;
                    });

                    Object.values(gruposReserva).forEach(grupo => {
                        totalPendente += grupo.valorSoma;
                        listaUnificada.push({
                            tipo: 'pendente', statusText: 'Reserva Pendente', nome: grupo.nome, whatsapp: grupo.whatsapp, numeros: grupo.numeros.sort((a,b) => a-b).join(', '), valorTotal: formatarMoeda(grupo.valorSoma), data: grupo.data
                        });
                    });
                }

                document.getElementById('cardLeads').innerText = listaUnificada.length;
                document.getElementById('cardAbandonado').innerText = formatarMoeda(totalAbandonado);
                document.getElementById('cardPendente').innerText = formatarMoeda(totalPendente);

                renderizarTabela(listaUnificada);

                // 🔥 LÓGICA DO ALERTA VISUAL E SONORO
                let totalAtual = listaUnificada.length;
                if (totalLeadsAnterior !== -1 && totalAtual > totalLeadsAnterior && alertasAtivos) {
                    somNotificacao.play().catch(e => console.log(e));
                    new Notification("🚨 Nova Oportunidade!", {
                        body: "Uma nova reserva ou carrinho abandonado caiu no painel. Vá conferir!",
                        icon: "https://i.postimg.cc/YqkptFRW/Design-sem-nome-(4).png"
                    });
                }
                totalLeadsAnterior = totalAtual;

            } catch (erro) { console.error("Erro ao buscar dados:", erro); }
        }

        function renderizarTabela(lista) {
            let tbody = document.getElementById('tabelaCorpo');
            tbody.innerHTML = '';

            if (lista.length === 0) {
                tbody.innerHTML = `<tr><td colspan="6" class="empty-state"><span style="font-size:40px;">✨</span><br><text>Tudo limpo! Não há pendências no momento.</text></td></tr>`;
                return;
            }

            lista.sort((a, b) => {
                if(a.data < b.data) return 1;
                if(a.data > b.data) return -1;
                return 0;
            });

            lista.forEach(item => {
                let tagClass = item.tipo === 'abandono' ? 'tag-abandono' : 'tag-pendente';
                let primeiroNome = item.nome.split(' ')[0];
                let msgWpp = "";
                
                if(item.tipo === 'abandono') {
                    msgWpp = `Olá ${primeiroNome}! Tudo bem? Vi aqui no sistema do Pix Influência que tentou separar as cotas [${item.numeros}], mas parou no meio do caminho. Teve alguma dúvida ou dificuldade com o site? Posso ajudar!`;
                } else {
                    msgWpp = `Olá ${primeiroNome}! Parabéns pela reserva das cotas [${item.numeros}] no Pix Influência. A sua reserva (${item.valorTotal}) é válida por apenas 30 minutos. Para garantir os seus números, a nossa chave PIX é: ${MINHA_CHAVE_PIX}. Assim que pagar, mande o comprovante!`;
                }

                let linkWpp = `https://wa.me/${item.whatsapp}?text=${encodeURIComponent(msgWpp)}`;

                let tr = document.createElement('tr');
                tr.innerHTML = `
                    <td><span class="tag ${tagClass}">${item.statusText}</span></td>
                    <td><b style="color: #1e293b;">${item.nome}</b><br><span style="font-size: 12px; color: #94a3b8;">${formatarZap(item.whatsapp)}</span></td>
                    <td><span class="numeros-badge">${item.numeros}</span></td>
                    <td class="valor-texto">${item.valorTotal}</td>
                    <td style="color: #64748b; font-size: 13px;">${item.data || 'Recente'}</td>
                    <td><a href="${linkWpp}" target="_blank" class="btn-wpp"><svg width="16" height="16" fill="currentColor" viewBox="0 0 24 24"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.305-.885-.653-1.482-1.46-1.656-1.758-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51a12.8 12.8 0 0 0-.57-.01c-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 0 1-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 0 1-1.51-5.26c.001-5.45 4.437-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 0 1 2.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0 0 12.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 0 0 5.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 0 0-3.48-8.413Z"/></svg>Recuperar Venda</a></td>
                `;
                tbody.appendChild(tr);
            });
        }

        banco.channel('monitor_abandonos')
            .on('postgres_changes', { event: '*', schema: 'public', table: 'carrinhos_abandonados' }, () => { buscarOportunidades(); })
            .subscribe();

        banco.channel('monitor_reservas')
            .on('postgres_changes', { event: 'UPDATE', schema: 'public', table: 'sorteio' }, () => { buscarOportunidades(); })
            .subscribe();

        buscarOportunidades();
    </script>
</body>
</html>
